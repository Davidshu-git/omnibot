services:

  # -----------------------------------------------------------
  # OmniStock - 盘后定时调度器（每日 15:30）
  # -----------------------------------------------------------
  stock-daily-job:
    build: .
    image: omnibot:latest
    container_name: v2-omnistock-daily-job
    mem_limit: 1g
    command: python -m stock_bot.daily_job
    restart: unless-stopped
    volumes:
      - ./core:/app/core
      - ./stock_bot:/app/stock_bot
      - ./data/stock/memory:/app/data/stock/memory
      - ./data/stock/agent_workspace:/app/data/stock/agent_workspace
      - ./data/stock/knowledge_base:/app/data/stock/knowledge_base
      - ./data/stock/embeddings:/app/data/stock/embeddings
      - ./jobs:/app/jobs
      - ./.env:/app/.env

  # -----------------------------------------------------------
  # OmniStock - Telegram Bot（实时交互）
  # -----------------------------------------------------------
  stock-tg-bot:
    build: .
    image: omnibot:latest
    container_name: v2-omnistock-tg-bot
    mem_limit: 1g
    command: python -m stock_bot.tg_main
    restart: unless-stopped
    volumes:
      - ./core:/app/core
      - ./stock_bot:/app/stock_bot
      - ./data/stock/memory:/app/data/stock/memory
      - ./data/stock/agent_workspace:/app/data/stock/agent_workspace
      - ./data/stock/knowledge_base:/app/data/stock/knowledge_base
      - ./data/stock/embeddings:/app/data/stock/embeddings
      - ./data/stock/observability:/app/data/stock/observability
      - ./jobs:/app/jobs
      - ./logs/stock:/app/logs
      - ./.env:/app/.env
    depends_on:
      - stock-daily-job

  # -----------------------------------------------------------
  # OmniEHS - Telegram Bot（实时交互）
  # -----------------------------------------------------------
  ehs-tg-bot:
    build: .
    image: omnibot:latest
    container_name: v2-omniehs-tg-bot
    mem_limit: 1g
    command: python -m ehs_bot.tg_main
    restart: unless-stopped
    volumes:
      - ./core:/app/core
      - ./ehs_bot:/app/ehs_bot
      - ./data/ehs/memory:/app/data/ehs/memory
      - ./data/ehs/agent_workspace:/app/data/ehs/agent_workspace
      - ./data/ehs/knowledge_base:/app/data/ehs/knowledge_base
      - ./data/ehs/embeddings:/app/data/ehs/embeddings
      - ./data/ehs/observability:/app/data/ehs/observability
      - ./jobs:/app/jobs
      - ./logs/ehs:/app/logs
      - ./.env:/app/.env

  # -----------------------------------------------------------
  # OmniMHXY - Telegram Bot（游戏控制）
  # -----------------------------------------------------------
  mhxy-tg-bot:
    build: .
    image: omnibot:latest
    container_name: v2-omnimhxy-tg-bot
    mem_limit: 2g
    entrypoint: /app/entrypoint.mhxy.sh
    command: ["python", "-m", "mhxy_bot.tg_main"]
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./core:/app/core
      - ./mhxy_bot:/app/mhxy_bot
      - ./data/mhxy/config:/app/data/mhxy/config
      - ./data/mhxy/memory:/app/data/mhxy/memory
      - ./data/mhxy/agent_workspace:/app/data/mhxy/agent_workspace
      - ./data/mhxy/knowledge_base:/app/data/mhxy/knowledge_base
      - ./data/mhxy/observability:/app/data/mhxy/observability
      - ./logs/mhxy:/app/logs
      - ./.env:/app/.env
      - /home/shudawei/.ssh:/root/.ssh_host:ro
