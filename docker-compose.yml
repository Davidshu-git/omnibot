services:

  # -----------------------------------------------------------
  # OmniStock - 盘后定时调度器（每日 15:30）
  # -----------------------------------------------------------
  stock-daily-job:
    build: .
    image: omnibot:latest
    container_name: v2-omnistock-daily-job
    command: python -m stock_bot.daily_job
    restart: unless-stopped
    volumes:
      - ./core:/app/core
      - ./stock_bot:/app/stock_bot
      - ./data/stock/memory:/app/data/stock/memory
      - ./data/stock/agent_workspace:/app/data/stock/agent_workspace
      - ./data/stock/knowledge_base:/app/data/stock/knowledge_base
      - ./data/stock/embeddings:/app/data/stock/embeddings
      - ./jobs:/app/jobs
      - ./.env:/app/.env

  # -----------------------------------------------------------
  # OmniStock - Telegram Bot（实时交互）
  # -----------------------------------------------------------
  stock-tg-bot:
    build: .
    image: omnibot:latest
    container_name: v2-omnistock-tg-bot
    command: python -m stock_bot.tg_main
    restart: unless-stopped
    volumes:
      - ./core:/app/core
      - ./stock_bot:/app/stock_bot
      - ./data/stock/memory:/app/data/stock/memory
      - ./data/stock/agent_workspace:/app/data/stock/agent_workspace
      - ./data/stock/knowledge_base:/app/data/stock/knowledge_base
      - ./data/stock/embeddings:/app/data/stock/embeddings
      - ./jobs:/app/jobs
      - ./.env:/app/.env
    depends_on:
      - stock-daily-job

  # -----------------------------------------------------------
  # OmniEHS - Telegram Bot（实时交互）
  # -----------------------------------------------------------
  ehs-tg-bot:
    build: .
    image: omnibot:latest
    container_name: v2-omniehs-tg-bot
    command: python -m ehs_bot.tg_main
    restart: unless-stopped
    volumes:
      - ./core:/app/core
      - ./ehs_bot:/app/ehs_bot
      - ./data/ehs/memory:/app/data/ehs/memory
      - ./data/ehs/agent_workspace:/app/data/ehs/agent_workspace
      - ./data/ehs/knowledge_base:/app/data/ehs/knowledge_base
      - ./data/ehs/embeddings:/app/data/ehs/embeddings
      - ./jobs:/app/jobs
      - ./.env:/app/.env
